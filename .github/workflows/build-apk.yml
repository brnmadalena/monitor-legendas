name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Gerar o Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Permitir execução do gradlew
        run: chmod +x gradlew

      - name: Compilar APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: monitor-legendas-apk
          path: app/build/outputs/apk/debug/app-debug.apk
